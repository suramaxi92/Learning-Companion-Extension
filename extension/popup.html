<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a2e;
      --bg-hover: #252540;
      --accent: #ff3e3e;
      --accent-hover: #ff5e5e;
      --accent-glow: rgba(255, 62, 62, 0.15);
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-muted: #6a6a80;
      --border: #2a2a40;
      --success: #4ade80;
      --success-bg: rgba(74, 222, 128, 0.1);
      --warning: #fbbf24;
      --warning-bg: rgba(251, 191, 36, 0.1);
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.1);
    }
    
    html {
      border-radius: 16px;
      overflow: hidden;
    }
    
    body { 
      width: 420px; 
      min-height: 520px; 
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary); 
      color: var(--text-primary);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #ff3e3e 0%, #e11d48 100%);
      padding: 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-radius: 16px 16px 0 0;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-title {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      position: relative;
      z-index: 1;
    }
    .header-subtitle {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 4px;
      font-weight: 500;
    }
    
    .nav {
      display: flex;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 6px;
      gap: 6px;
    }
    .nav-btn {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: none;
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.25s ease;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .nav-btn:hover { 
      color: var(--text-secondary); 
      background: var(--bg-tertiary);
    }
    .nav-btn.active {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 25%;
      right: 25%;
      height: 3px;
      background: var(--accent);
      border-radius: 3px;
    }
    .nav-icon {
      font-size: 13px;
    }
    
    .content {
      padding: 16px;
      min-height: 380px;
    }
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }
    .card:hover {
      border-color: var(--bg-hover);
    }
    
    .video-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .video-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #e11d48);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .video-details {
      flex: 1;
      min-width: 0;
    }
    .video-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .video-title {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #e11d48);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 62, 62, 0.2);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--accent);
    }
    
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px; 
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 13px;
      font-weight: 500;
    }
    .loading-subtext {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    
    .notes-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.8;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .notes-container h3 {
      color: var(--accent);
      margin: 16px 0 10px;
      font-size: 14px;
      font-weight: 700;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .notes-container h3:first-child { margin-top: 0; }
    .notes-container h4 {
      color: #ff6b6b;
      margin: 12px 0 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .notes-container ul {
      margin-left: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .notes-container li { 
      margin: 6px 0; 
    }
    .notes-container li::marker {
      color: var(--accent);
    }
    .notes-container strong { 
      color: var(--text-primary); 
      font-weight: 600;
    }
    .timestamp {
      color: var(--accent);
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      background: var(--accent-glow);
      padding: 2px 8px;
      border-radius: 6px;
      margin-right: 6px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .timestamp:hover {
      background: var(--accent);
      color: white;
    }
    
    .input-group {
      margin-bottom: 12px;
    }
    .input-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .transcript-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 12px;
      min-height: 100px;
      resize: vertical;
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      transition: all 0.2s;
    }
    .transcript-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .transcript-input::placeholder {
      color: var(--text-muted);
    }
    
    .hint-box {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .hint-title {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hint-steps {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .hint-steps code {
      background: var(--bg-primary);
      padding: 2px 8px;
      border-radius: 6px;
      color: var(--accent);
      font-family: 'SF Mono', monospace;
      font-size: 10px;
    }
    
    .chat-container {
      max-height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-msg {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 90%;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-msg.user {
      background: linear-gradient(135deg, var(--accent), #e11d48);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.ai {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .chat-msg.user .chat-label { color: rgba(255,255,255,0.8); }
    .chat-msg.ai .chat-label { color: var(--accent); }
    
    .doubts-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      margin-bottom: 10px;
      resize: vertical;
      min-height: 50px;
      font-family: 'Inter', system-ui, sans-serif;
      transition: all 0.2s;
    }
    .doubts-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .doubts-input::placeholder {
      color: var(--text-muted);
    }
    
    .question-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .question-card:hover {
      border-color: var(--bg-hover);
    }
    .question-number {
      display: inline-block;
      background: var(--accent-glow);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .question-text {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option {
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .option:hover { 
      background: var(--bg-hover); 
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .option-letter {
      width: 28px;
      height: 28px;
      background: var(--bg-primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .option:hover .option-letter {
      background: var(--accent);
      color: white;
    }
    .option.correct { 
      background: var(--success-bg); 
      border-color: var(--success);
      color: var(--success);
    }
    .option.correct .option-letter {
      background: var(--success);
      color: var(--bg-primary);
    }
    .option.wrong { 
      background: var(--error-bg); 
      border-color: var(--error);
      color: var(--error);
    }
    .option.wrong .option-letter {
      background: var(--error);
      color: white;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.ready {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }
    .status-badge.empty {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    
    .error-box {
      background: var(--error-bg);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--error);
      padding: 14px;
      border-radius: 10px;
      font-size: 12px;
      text-align: center;
      font-weight: 500;
    }
    
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    
    /* Learn Next Tab Styles */
    .recommendation-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .recommendation-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .rec-number {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      background: var(--accent-glow);
      color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    .rec-topic {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 13px;
      margin-bottom: 6px;
      padding-right: 30px;
    }
    .rec-desc {
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .rec-difficulty {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .rec-difficulty.beginner {
      background: rgba(74, 222, 128, 0.15);
      color: var(--success);
    }
    .rec-difficulty.intermediate {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warning);
    }
    .rec-difficulty.advanced {
      background: rgba(248, 113, 113, 0.15);
      color: var(--error);
    }
    .rec-search {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .rec-search:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { 
      background: var(--bg-hover); 
      border-radius: 3px; 
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🎬 YouTube NoteTaker</div>
    <div class="header-subtitle">AI-Powered Study Assistant</div>
  </div>
  
  <div class="nav">
    <button class="nav-btn active" data-tab="notes">
      <span class="nav-icon">📝</span> Notes
    </button>
    <button class="nav-btn" data-tab="doubts">
      <span class="nav-icon">❓</span> Doubts
    </button>
    <button class="nav-btn" data-tab="questions">
      <span class="nav-icon">📋</span> Qs
    </button>
    <button class="nav-btn" data-tab="learn">
      <span class="nav-icon">📚</span> Learn
    </button>
  </div>
  
  <div class="content">
    <!-- Notes Tab -->
    <div id="notes" class="tab-content active">
      <div class="video-info card">
        <div class="video-icon">▶</div>
        <div class="video-details">
          <div class="video-label">Current Video</div>
          <div class="video-title" id="videoInfo">Loading...</div>
        </div>
      </div>
      
      <div id="notesResult"></div>
      
      <button class="btn btn-secondary" id="downloadNotesBtn" style="display: none; margin-top: 12px;">
        <span>📥</span> Download as PDF
      </button>
      
      <button class="btn btn-primary" id="generateNotesBtn" style="margin-top: 12px;">
        <span>✨</span> Generate Notes
      </button>
    </div>
    
    <!-- Doubts Tab -->
    <div id="doubts" class="tab-content">
      <div class="video-info card">
        <div class="video-icon">💬</div>
        <div class="video-details">
          <div class="video-label">Ask AI</div>
          <div class="video-title" id="videoInfoDoubts">Loading...</div>
        </div>
      </div>
      
      <div class="status-row">
        <div id="notesStatus" class="status-badge empty">
          <span class="status-dot"></span>
          No notes yet
        </div>
      </div>
      
      <textarea class="doubts-input" id="doubtInput" placeholder="Ask anything about the video content..."></textarea>
      <button class="btn btn-primary" id="askBtn">
        <span>🚀</span> Ask AI
      </button>
      
      <div class="chat-container" id="chatContainer"></div>
    </div>
    
    <!-- Questions Tab -->
    <div id="questions" class="tab-content">
      <div class="video-info card">
        <div class="video-icon">🎯</div>
        <div class="video-details">
          <div class="video-label">Practice</div>
          <div class="video-title" id="videoInfoQuestions">Loading...</div>
        </div>
      </div>
      
      <div class="status-row">
        <div id="questionsStatus" class="status-badge empty">
          <span class="status-dot"></span>
          No notes yet
        </div>
      </div>
      
      <button class="btn btn-primary" id="generateQuestionsBtn">
        <span>🎯</span> Generate Exam Questions
      </button>
      
      <div id="questionsResult"></div>
    </div>
    
    <!-- Learn Next Tab -->
    <div id="learn" class="tab-content">
      <div class="video-info card">
        <div class="video-icon">📚</div>
        <div class="video-details">
          <div class="video-label">Continue Learning</div>
          <div class="video-title" id="videoInfoLearn">Based on your notes</div>
        </div>
      </div>
      
      <div class="status-row">
        <div id="learnStatus" class="status-badge empty">
          <span class="status-dot"></span>
          Generate notes first
        </div>
      </div>
      
      <button class="btn btn-primary" id="generateLearnBtn">
        <span>🎯</span> Get Recommendations
      </button>
      
      <div id="learnResult"></div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
